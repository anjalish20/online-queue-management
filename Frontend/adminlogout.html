<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logout Confirmation</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<!-- Logout Modal -->
<div class="modal fade" id="logoutModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">

      <div class="modal-body p-4">

        <!-- Title -->
        <div class="d-flex align-items-center mb-3">
          <div class="me-2 text-danger fs-4">
            <i class="bi bi-exclamation-circle"></i>
          </div>
          <h5 class="mb-0 text-danger fw-semibold">Confirm Logout</h5>
        </div>

        <!-- Message -->
        <p class="text-muted mb-4">
          Are you sure you want to logout? You will be redirected to the login page.
        </p>

        <!-- Buttons -->
        <div class="d-flex justify-content-end gap-2">
          <!-- Cancel = just close modal -->
          <button type="button" class="btn btn-light border" data-bs-dismiss="modal">
            Cancel
          </button>

          <!-- Confirm = redirect -->
          <button type="button" class="btn btn-danger px-4" onclick="confirmLogout()">
            <i class="bi bi-box-arrow-right me-1"></i> Logout
          </button>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Show modal automatically when page loads
  var logoutModal = new bootstrap.Modal(document.getElementById('logoutModal'));
  window.onload = function () {
    logoutModal.show();
  };

  // Redirect on confirm
  function confirmLogout() {
    window.location.href = "firstpage.html";
  }
</script>

</body>
</html>
