<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: #f4f6fb;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      max-width: 900px;
      width: 100%;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .login-left {
      background: linear-gradient(135deg, #1f3a8a, #274fc7);
      color: white;
      padding: 40px;
    }

    .login-left h3 {
      font-weight: 600;
    }

    .login-right {
      padding: 40px;
    }

    .login-box {
      max-width: 350px;
      margin: auto;
    }

    .btn-login {
      background: #274fc7;
      color: white;
      border-radius: 10px;
    }

    .btn-login:hover {
      background: #1f3a8a;
    }
  </style>
</head>

<body>

<div class="login-container row g-0">

  <!-- LEFT SIDE -->
  <div class="col-md-5 login-left d-flex flex-column justify-content-center">
    <h3>Government Services<br>Queue Management</h3>
    <p class="mt-3">
      Admin dashboard for efficient queue management of government services.
    </p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="col-md-7 login-right">
    <div class="login-box">

      <div class="text-center mb-4">
        <i class="bi bi-shield-lock fs-1 text-primary"></i>
        <h4 class="mt-2">Admin Login</h4>
        <small class="text-muted">
          Please enter your credentials to continue
        </small>
      </div>

      <!-- LOGIN FORM -->
      <form action="adminlogin.html" method="get">
        
        <div class="mb-3">
          <label class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-envelope"></i>
            </span>
            <input type="email" class="form-control" placeholder="Enter your email" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock"></i>
            </span>
            <input type="password" class="form-control" placeholder="Enter your password" required>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label" for="remember">
              Remember me
            </label>
          </div>
          <a href="#" class="text-decoration-none">Forgot password?</a>
        </div>

        <!-- LOGIN BUTTON -->
          <a href="adminindex.html" class="btn btn-primary w-100">
  Login
</a>

        </button>

      </form>

    </div>
  </div>

</div>

</body>
</html>
