<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NP GovQueue Admin - Appointments</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background:#f4f6f8; }

/* Sidebar */
.sidebar{
  background:#1e3a8a;
  min-height:100vh;
  color:#fff;
}
.sidebar a{
  color:#cbd5e1;
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 15px;
  border-radius:8px;
  margin-bottom:6px;
}
.sidebar a.active,
.sidebar a:hover{
  background:#2563eb;
  color:#fff;
}
.logout-btn{
  background:#dc2626;
  color:#fff;
  border-radius:8px;
}

/* Cards */
.stat-card{
  background:#fff;
  padding:20px;
  border-radius:14px;
  box-shadow:0 1px 2px rgba(0,0,0,0.05);
}

/* Appointment */
.appointment-box{
  background:#fff;
  padding:20px;
  border-radius:14px;
  box-shadow:0 1px 2px rgba(0,0,0,0.05);
}
.date-box{
  background:#2563eb;
  color:#fff;
  border-radius:12px;
  padding:12px;
  min-width:90px;
  text-align:center;
}
.status-badge{
  background:#2563eb;
  color:#fff;
  padding:6px 12px;
  border-radius:20px;
  font-size:13px;
}

/* Responsive sidebar */
@media(max-width:768px){
  .sidebar{
    position:fixed;
    width:240px;
    left:-240px;
    transition:0.3s;
    z-index:1000;
  }
  .sidebar.show{ left:0; }
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 sidebar p-3" id="sidebar">
  <h5 class="fw-bold">NP GovQueue Admin</h5>
  <small>Government Office Nepal</small>
  <hr>
  <a href="adminindex.html">
  <i class="bi bi-speedometer2 me-2"></i>Dashboard
</a>

<a href="adminappointment.html" class="active">
  <i class="bi bi-calendar-check me-2"></i>Appointments
</a>

<a href="admintoken.html">
  <i class="bi bi-people me-2"></i>Walk-in Queue
</a>

<a href="adminanalytics.html"> 
<i class="bi bi-graph-up me-2"></i>Analytics
</a>

<a href="adminfeedback.html">
  <i class="bi bi-gear me-2"></i>Feedback
</a>

<a href="settings.html">
  <i class="bi bi-gear me-2"></i>Settings
</a>


  
  <div class="mt-4">
    <button class="btn logout-btn w-100" onclick="logout()">
      <i class="bi bi-box-arrow-right"></i> Logout
    </button>
  </div>
</div>


<!-- MAIN -->
<div class="col-md-10 ms-auto p-4">

<!-- TOP BAR -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <button class="btn btn-outline-primary d-md-none" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
  </button>
  <h4>Appointments</h4>
  <div class="d-flex gap-3">
    <input class="form-control" placeholder="Search...">
    <i class="bi bi-person-circle fs-4"></i>
  </div>
</div>

<!-- SERVICE SELECT -->
<select class="form-select w-auto mb-4" onchange="changeService(this.value)">
  <option value="citizenship">Citizenship</option>
  <option value="passport">Passport</option>
  <option value="ID card service">ID card service</option>
</select>

<!-- STATS -->
<div class="row g-3 mb-4">
  <div class="col-md-3 col-6"><div class="stat-card"><small>Total</small><h3 id="total">0</h3></div></div>
  <div class="col-md-3 col-6"><div class="stat-card"><small>Scheduled</small><h3 id="scheduled">0</h3></div></div>
  <div class="col-md-3 col-6"><div class="stat-card"><small>Confirmed</small><h3 id="confirmed">0</h3></div></div>
  <div class="col-md-3 col-6"><div class="stat-card"><small>Completed</small><h3 id="completed">0</h3></div></div>
</div>

<!-- APPOINTMENTS -->
<div class="appointment-box">
  <h5 id="serviceTitle"></h5>
  <small class="text-muted">Manage and track appointments</small>
  <hr>
  <div id="appointmentList"></div>
</div>

</div>
</div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const services = {
  birth:{
    name:"citizenship",
    stats:{total:1,scheduled:0,confirmed:1,completed:0},
    appointments:[{
      name:"Alice Wilson",
      time:"09:22 PM",
      day:"11",
      month:"Feb",
      id:"ID456789",
      phone:"+1234567892",
      email:"alice@example.com",
      status:"Scheduled"
    }]
  },
  passport:{
    name:"passport",
    stats:{total:1,scheduled:1,confirmed:0,completed:0},
    appointments:[{
      name:"Ram Shrestha",
      time:"10:00 AM",
      day:"12",
      month:"Feb",
      id:"ID998877",
      phone:"+9779812345678",
      email:"ram@gmail.com",
      status:"Scheduled"
    }]
  },
  IDcardservice:{
    name:"IDcard",
    stats:{total:1,scheduled:0,confirmed:0,completed:1},
    appointments:[{
      name:"Sita Thapa",
      time:"01:30 PM",
      day:"13",
      month:"Feb",
      id:"ID776655",
      phone:"+9779800001111",
      email:"sita@gmail.com",
      status:"Completed"
    }]
  }
};

let currentService = "birth";
changeService(currentService);

function changeService(key){
  currentService = key;
  const s = services[key];

  serviceTitle.innerText = `All Appointments - ${s.name}`;
  total.innerText = s.stats.total;
  scheduled.innerText = s.stats.scheduled;
  confirmed.innerText = s.stats.confirmed;
  completed.innerText = s.stats.completed;

  const list = appointmentList;
  list.innerHTML = "";

  s.appointments.forEach((a,i)=>{
    list.innerHTML += `
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3 p-3 border rounded">
      <div class="d-flex gap-3 align-items-center">
        <div class="date-box">
          <small>${a.month}</small>
          <h6 class="mb-0">${a.time}</h6>
          <small>${a.day}</small>
        </div>
        <div>
          <h6>${a.name}</h6>
          <small class="text-muted">
            ID:${a.id} • ${a.phone} • ${a.email}
          </small><br>
          <span class="status-badge">${a.status}</span>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-success" onclick="confirmApp(${i})">
          <i class="bi bi-check-circle"></i> Confirm
        </button>
        <button class="btn btn-outline-danger" onclick="cancelApp(${i})">
          <i class="bi bi-x-circle"></i> Cancel
        </button>
      </div>
    </div>`;
  });
}

function confirmApp(index){
  const app = services[currentService].appointments[index];
  if(app.status !== "Confirmed"){
    app.status = "Confirmed";
    services[currentService].stats.confirmed++;
    services[currentService].stats.scheduled =
      Math.max(0, services[currentService].stats.scheduled - 1);
    changeService(currentService);
  }
}

function cancelApp(index){
  if(confirm("Cancel this appointment?")){
    services[currentService].appointments.splice(index,1);
    services[currentService].stats.total--;
    changeService(currentService);
  }
}

function toggleSidebar(){ sidebar.classList.toggle("show"); }
function nav(page){ alert("Navigate to " + page); }
function logout(){ if(confirm("Logout?")) alert("Logged out"); }
</script>

</body>
</html>
